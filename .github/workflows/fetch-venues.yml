name: Fetch Venues

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1,15 * *" # 1st and 15th of each month at 6am UTC

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Download theatre cache from R2
        run: |
          wrangler r2 object get imaxnearme-data/theatre-details.json --file=theatre-details.json --remote
          echo "Cache size: $(wc -c < theatre-details.json) bytes"

      - name: Fetch venue data
        run: bash scripts/fetch-imax-venues.sh
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}

      - name: Upload venue data to R2
        run: bash scripts/safe-r2-upload.sh imaxnearme-data/imax-venues.json imax-venues.json

      - name: Upload theatre cache to R2
        run: bash scripts/safe-r2-upload.sh imaxnearme-data/theatre-details.json theatre-details.json
